# Pipeline configuration — Aiven Kafka only (no local Docker Kafka)
# Required: .env with KAFKA_BOOTSTRAP_SERVERS and SSL cert paths (see .env.example and docs/AIVEN_SETUP_STEP_BY_STEP.md)
# spark_packages: used by scripts/run_bronze.sh (Kafka connector; not in PyPI)

spark_packages: "org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.2"  # Spark 4.x; for 3.x use spark-sql-kafka-0-10_2.12:3.5.0

kafka:
  bootstrap_servers: "${KAFKA_BOOTSTRAP_SERVERS}"
  topic_orders: "orders"
  topic_dlq: "orders_dlq"
  consumer_group: "order-medallion-v1"
  starting_offsets: "${KAFKA_STARTING_OFFSETS:-latest}"  # set KAFKA_STARTING_OFFSETS=earliest to backfill existing messages
  # Optional: for managed Kafka (Aiven, Confluent Cloud) — set env vars, leave empty for local Docker
  security_protocol: "${KAFKA_SECURITY_PROTOCOL:-}"
  ssl_ca_location: "${KAFKA_SSL_CA_LOCATION:-}"
  ssl_cert_location: "${KAFKA_SSL_CERT_LOCATION:-}"
  ssl_key_location: "${KAFKA_SSL_KEY_LOCATION:-}"
  sasl_mechanism: "${KAFKA_SASL_MECHANISM:-}"
  sasl_username: "${KAFKA_SASL_USERNAME:-}"
  sasl_password: "${KAFKA_SASL_PASSWORD:-}"

streaming:
  trigger_interval: "1 minute"   # or "availableNow" for micro-batch
  watermark_delay: "10 minutes"
  allowed_lateness: "1 hour"
  max_offsets_per_trigger: 10000
  # true = fail if Kafka offsets reset (e.g. topic recreated). Use false only for local dev with ephemeral Kafka.
  fail_on_data_loss: true

paths:
  base: "${BASE_PATH:-s3://your-bucket/data}"
  checkpoint_bronze: "${BASE_PATH}/checkpoints/bronze_orders"
  checkpoint_silver: "${BASE_PATH}/checkpoints/silver_orders"
  bronze_orders: "${BASE_PATH}/bronze/orders"
  silver_orders: "${BASE_PATH}/silver/orders"
  silver_order_items: "${BASE_PATH}/silver/order_items"
  gold_daily_sales: "${BASE_PATH}/gold/daily_sales"
  gold_customer_360: "${BASE_PATH}/gold/customer_360"
  gold_restaurant_metrics: "${BASE_PATH}/gold/restaurant_metrics"

postgres:
  # Optional sink for serving layer
  jdbc_url: "${POSTGRES_JDBC_URL}"
  sink_table_orders: "analytics.daily_sales"
  batch_size: 1000
