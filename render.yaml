# Render Blueprint: one Web Service for the hotel ordering website.
# After deploy, add env vars in Dashboard: KAFKA_BOOTSTRAP_SERVERS, KAFKA_SECURITY_PROTOCOL,
# KAFKA_TOPIC, KAFKA_SSL_CA_CERT, KAFKA_SSL_CERT_CERT, KAFKA_SSL_KEY_CERT (see docs/RENDER_WEBSITE_HOSTING_STEP_BY_STEP.md).

services:
  - type: web
    name: hotel-order-medallion
    runtime: python
    region: oregon

    # Repo and branch (set when connecting repo; override in Dashboard if needed)
    branch: main

    # App lives in web/; build and run from there
    rootDir: web
    buildCommand: pip install -r ../requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT

    plan: free
