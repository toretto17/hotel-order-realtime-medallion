<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your orders — The Collage of Colours</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="page-orders">
  <div class="page">
    <div class="top-bar top-bar-page">
      <a href="/" class="top-bar-link">Home</a>
      <span class="top-bar-current">Your orders</span>
      <button type="button" class="top-bar-login top-bar-login-visible" id="btn-open-login" aria-label="Login">Login</button>
    </div>
    <main class="main main-standalone">
      <section class="section">
        <header class="orders-view-header">
          <h1 class="section-title">Your orders</h1>
          <div class="orders-view-actions">
            <button type="button" class="btn btn-secondary" id="btn-refresh-orders">Refresh</button>
          </div>
        </header>
        <p class="section-desc">Status and preparation for orders placed from this device.</p>
        <div id="your-orders-list" class="orders-list-wrap">
          <p class="orders-loading" id="your-orders-loading">Loading…</p>
          <table class="orders-table orders-table-improved" id="your-orders-table" aria-label="Your orders" style="display:none;">
            <thead>
              <tr><th>Order</th><th>Items</th><th class="th-num">Qty</th><th class="th-num">Total</th><th>Status</th><th>Ordered at</th><th>Prep</th></tr>
            </thead>
            <tbody id="your-orders-tbody"></tbody>
          </table>
          <p class="orders-empty" id="your-orders-empty" style="display:none;">No orders yet. <a href="/">Place an order</a>.</p>
        </div>
      </section>
    </main>
  </div>
  <script src="/static/js/orders_page.js"></script>
</body>
</html>
